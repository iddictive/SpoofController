name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build App
        id: build_app
        run: |
          bash build.sh

          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "DPIKiller.app/Contents/Info.plist")
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "VERSION=$APP_VERSION" >> $GITHUB_OUTPUT

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $APP_VERSION" "DPIKiller.app/Contents/Info.plist" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $APP_VERSION" "DPIKiller.app/Contents/Info.plist"

          # Re-sign after plist modification
          codesign --force --deep --sign - DPIKiller.app

      - name: Create DMG
        run: |
          bash scripts/create_dmg.sh

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: DPI Killer v${{ env.APP_VERSION }}
          files: DPIKiller.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
